name: Matrix File
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Cloning to user-space
        uses: actions/checkout@v4
      
      - name: Installing the python version $ {{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Print Python Version
        run: python --version
