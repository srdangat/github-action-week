name: Scheduled workflow

on:
  schedule:
    - cron: "30 2 * * 1" # every Monday at 2:30 AM UTC
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print which schedule triggered 
        run: |
          echo "Workflow triggered by cron schedule: ${{ github.event.schedule }}"

      - name: Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.trainwithshubham.com/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed!"
          exit 1
          fi
